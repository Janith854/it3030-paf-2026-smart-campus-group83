spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  upload-dir: uploads/
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
