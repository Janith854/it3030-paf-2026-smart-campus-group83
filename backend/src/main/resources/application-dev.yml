spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartcampus}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
            

jwt:
  secret: ${JWT_SECRET:dev_secret_key_at_least_32_characters_long_for_security}
  expiration: 86400000

app:
  upload-dir: uploads/
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
